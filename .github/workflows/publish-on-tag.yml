name: Publish VSIX on tag

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build and release VSIX
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Build + Package VSIX
        run: npm run package:vsix

      - name: Find VSIX file
        id: find_vsix
        run: |
          echo "vsix=$(ls *.vsix | head -n1)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: |
            Release generated by CI for tag ${{ github.ref_name }}.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload VSIX to Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.find_vsix.outputs.vsix }}
          asset_name: ${{ steps.find_vsix.outputs.vsix }}
          asset_content_type: application/octet-stream
